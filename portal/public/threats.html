<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar — Threats</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <div class="brand-mark"></div>
    <span class="brand-name">Radar</span>
    <div class="live-indicator"><span class="live-dot"></span>Live</div>
  </div>
  <div class="navbar-links">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/threats.html" class="nav-link active">Threats</a>
    <a href="/sectors.html" class="nav-link">Sectors</a>
    <a href="/iocs.html" class="nav-link">IOCs</a>
    <a href="/actors.html" class="nav-link">Actors</a>
    <a href="/feeds.html" class="nav-link">Feeds</a>
  </div>
  <div class="navbar-actions">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="global-search" placeholder="Filter threats…" oninput="filterThreats(this.value)">
    </div>
    <button class="btn-sync" onclick="triggerPipeline()">Sync Now</button>
  </div>
</nav>

<main class="page">
  <div class="page-header">
    <div class="page-title">Threat Feed</div>
    <span class="text-xs text-3" id="results-count"></span>
  </div>

  <div class="filter-panel threat-filter-panel mb-4">
    <div class="filter-panel-row threat-filter-row">
      <div class="fp-group fp-group--stack">
        <span class="fp-label">Severity</span>
        <div class="filter-group">
          <button class="filter-pill active" data-filter="severity" data-val="" onclick="setFilterPill(this,'severity','')">All</button>
          <button class="filter-pill critical" data-filter="severity" data-val="critical" onclick="setFilterPill(this,'severity','critical')">Critical</button>
          <button class="filter-pill high" data-filter="severity" data-val="high" onclick="setFilterPill(this,'severity','high')">High</button>
          <button class="filter-pill medium" data-filter="severity" data-val="medium" onclick="setFilterPill(this,'severity','medium')">Medium</button>
          <button class="filter-pill low" data-filter="severity" data-val="low" onclick="setFilterPill(this,'severity','low')">Low</button>
        </div>
      </div>

      <div class="fp-group fp-group--stack">
        <span class="fp-label">Sector</span>
        <div class="filter-group">
          <button class="filter-pill active" data-filter="sector" data-val="" onclick="setFilterPill(this,'sector','')">All</button>
          <button class="filter-pill banking" data-filter="sector" data-val="banking" onclick="setFilterPill(this,'sector','banking')">Banking</button>
          <button class="filter-pill government" data-filter="sector" data-val="government" onclick="setFilterPill(this,'sector','government')">Government</button>
          <button class="filter-pill healthcare" data-filter="sector" data-val="healthcare" onclick="setFilterPill(this,'sector','healthcare')">Healthcare</button>
        </div>
      </div>

      <div class="fp-group fp-group--stack">
        <span class="fp-label">Window</span>
        <div class="time-pills">
          <button class="time-pill" data-days="1" onclick="setDaysPill(this,1)">24h</button>
          <button class="time-pill active" data-days="7" onclick="setDaysPill(this,7)">7d</button>
          <button class="time-pill" data-days="14" onclick="setDaysPill(this,14)">14d</button>
          <button class="time-pill" data-days="30" onclick="setDaysPill(this,30)">30d</button>
        </div>
      </div>

      <div class="fp-group fp-group--stack">
        <span class="fp-label">Type</span>
        <select class="filter-select" id="f-type" onchange="applyFilters()">
          <option value="">All Types</option>
          <option value="vulnerability">Vulnerability</option>
          <option value="zero_day">Zero Day</option>
          <option value="ransomware">Ransomware</option>
          <option value="apt">APT</option>
          <option value="phishing">Phishing</option>
          <option value="malware">Malware</option>
          <option value="data_breach">Data Breach</option>
          <option value="supply_chain">Supply Chain</option>
          <option value="ddos">DDoS</option>
        </select>
      </div>

      <div class="fp-group fp-group--stack">
        <span class="fp-label">Evidence</span>
        <div class="filter-check-row">
          <label class="filter-check"><input type="checkbox" id="f-has-cves" onchange="applyFilters()"> CVEs</label>
          <label class="filter-check"><input type="checkbox" id="f-has-iocs" onchange="applyFilters()"> IOCs</label>
        </div>
      </div>

      <!-- Hidden legacy selects used by JS -->
      <select id="f-severity" style="display:none"><option value=""></option></select>
      <select id="f-sector"   style="display:none"><option value=""></option></select>
      <select id="f-days"     style="display:none"><option value="7" selected></option></select>
    </div>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th onclick="sortBy('severity')">Severity</th>
            <th onclick="sortBy('title')">Threat</th>
            <th>Sectors</th>
            <th>Type</th>
            <th onclick="sortBy('credibility_score')">Confidence</th>
            <th>IOCs</th>
            <th>CVEs</th>
            <th onclick="sortBy('ingested_at')">Ingested</th>
          </tr>
        </thead>
        <tbody id="threats-tbody">
          <tr><td colspan="8" style="padding:40px;text-align:center;color:var(--text-3)">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<div class="toast-wrap" id="toasts"></div>
<script src="/js/common.js"></script>
<script src="/js/threats.js"></script>
</body>
</html>
