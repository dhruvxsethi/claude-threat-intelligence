<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threat Feed — CTI Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-title"><span class="live-dot"></span>CTI Platform</div>
      <div class="logo-sub">Powered by Claude AI</div>
    </div>
    <div class="nav">
      <div class="nav-section">Intelligence</div>
      <a class="nav-item" href="/"><span class="nav-icon">⚡</span> Dashboard</a>
      <a class="nav-item active" href="/threats.html"><span class="nav-icon">🛡</span> Threat Feed</a>
      <a class="nav-item" href="/sectors.html"><span class="nav-icon">🏢</span> Sectors</a>
      <a class="nav-item" href="/iocs.html"><span class="nav-icon">🔍</span> IOC Explorer</a>
      <div class="nav-section" style="margin-top:8px">System</div>
      <a class="nav-item" href="/feeds.html"><span class="nav-icon">📡</span> Feed Health</a>
    </div>
    <div class="sidebar-footer">
      <div id="last-run" class="text-xs">Loading...</div>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="page-title">Threat Feed</div>
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="global-search" placeholder="Search threats..." onkeyup="filterThreats(this.value)">
      </div>
      <div class="topbar-time" id="utc-clock">00:00:00 UTC</div>
      <button class="btn btn-primary" onclick="triggerPipeline()">▶ Run Pipeline</button>
    </div>

    <div class="content">
      <div class="filters">
        <select class="filter-select" id="f-severity" onchange="applyFilters()">
          <option value="">All Severities</option>
          <option value="critical">🔴 Critical</option>
          <option value="high">🟠 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
        <select class="filter-select" id="f-sector" onchange="applyFilters()">
          <option value="">All Sectors</option>
          <option value="banking">🏦 Banking</option>
          <option value="government">🏛️ Government</option>
          <option value="healthcare">🏥 Healthcare</option>
        </select>
        <select class="filter-select" id="f-type" onchange="applyFilters()">
          <option value="">All Types</option>
          <option value="ransomware">Ransomware</option>
          <option value="apt">APT</option>
          <option value="phishing">Phishing</option>
          <option value="vulnerability">Vulnerability</option>
          <option value="data_breach">Data Breach</option>
          <option value="supply_chain">Supply Chain</option>
          <option value="zero_day">Zero Day</option>
          <option value="ddos">DDoS</option>
        </select>
        <select class="filter-select" id="f-days" onchange="applyFilters()">
          <option value="1">Last 24h</option>
          <option value="7" selected>Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30">Last 30 days</option>
        </select>
        <label class="flex items-center gap-2 text-sm text-dim" style="cursor:pointer">
          <input type="checkbox" id="f-has-cves" onchange="applyFilters()" style="accent-color:var(--primary)">
          Has CVEs
        </label>
        <label class="flex items-center gap-2 text-sm text-dim" style="cursor:pointer">
          <input type="checkbox" id="f-has-iocs" onchange="applyFilters()" style="accent-color:var(--primary)">
          Has IOCs
        </label>
        <div style="flex:1"></div>
        <span class="text-xs text-muted" id="results-count"></span>
      </div>

      <div class="card">
        <div class="threat-table-wrap">
          <table class="threat-table">
            <thead>
              <tr>
                <th onclick="sortBy('severity')">Severity</th>
                <th onclick="sortBy('title')">Threat</th>
                <th>Sectors</th>
                <th>Type</th>
                <th onclick="sortBy('credibility_score')">Confidence</th>
                <th>IOCs</th>
                <th>CVEs</th>
                <th onclick="sortBy('ingested_at')">Ingested</th>
              </tr>
            </thead>
            <tbody id="threats-tbody">
              <tr><td colspan="8" class="text-center text-muted" style="padding:40px">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toasts"></div>
<script src="/js/common.js"></script>
<script src="/js/threats.js"></script>
</body>
</html>
