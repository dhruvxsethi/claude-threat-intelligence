<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Health — CTI Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-title"><span class="live-dot"></span>CTI Platform</div>
      <div class="logo-sub">Powered by Claude AI</div>
    </div>
    <div class="nav">
      <div class="nav-section">Intelligence</div>
      <a class="nav-item" href="/"><span class="nav-icon">⚡</span> Dashboard</a>
      <a class="nav-item" href="/threats.html"><span class="nav-icon">🛡</span> Threat Feed</a>
      <a class="nav-item" href="/sectors.html"><span class="nav-icon">🏢</span> Sectors</a>
      <a class="nav-item" href="/iocs.html"><span class="nav-icon">🔍</span> IOC Explorer</a>
      <div class="nav-section" style="margin-top:8px">System</div>
      <a class="nav-item active" href="/feeds.html"><span class="nav-icon">📡</span> Feed Health</a>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="page-title">Feed Health</div>
      <div class="topbar-time" id="utc-clock">00:00:00 UTC</div>
      <button class="btn btn-primary" onclick="triggerPipeline()">▶ Run Pipeline</button>
    </div>

    <div class="content">
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card low">
          <div class="stat-value" id="feeds-healthy">—</div>
          <div class="stat-label">Healthy</div>
        </div>
        <div class="stat-card critical">
          <div class="stat-value" id="feeds-failed">—</div>
          <div class="stat-label">Failed</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-value" id="feeds-total">—</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-value" id="runs-today">—</div>
          <div class="stat-label">Runs Today</div>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-header"><div class="card-title">Feed Status</div></div>
        <div id="feed-health-list">Loading...</div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Recent Pipeline Runs</div></div>
        <div id="recent-runs">Loading...</div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toasts"></div>
<script src="/js/common.js"></script>
<script src="/js/feeds.js"></script>
</body>
</html>
