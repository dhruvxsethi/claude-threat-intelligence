<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar — Feed Health</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <div class="brand-mark"></div>
    <span class="brand-name">Radar</span>
    <div class="live-indicator"><span class="live-dot"></span>Live</div>
  </div>
  <div class="navbar-links">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/threats.html" class="nav-link">Threats</a>
    <a href="/sectors.html" class="nav-link">Sectors</a>
    <a href="/iocs.html" class="nav-link">IOCs</a>
    <a href="/actors.html" class="nav-link">Actors</a>
    <a href="/feeds.html" class="nav-link active">Feeds</a>
  </div>
  <div class="navbar-actions">
    <button class="btn-sync" onclick="triggerPipeline()">Sync Now</button>
  </div>
</nav>

<main class="page">
  <div class="page-header">
    <div class="page-title">Feed Health</div>
  </div>

  <div class="stats-grid mb-6">
    <div class="stat-card c-low">
      <div class="glow"></div>
      <div class="stat-icon">✓</div>
      <div class="stat-value" id="feeds-healthy">—</div>
      <div class="stat-label">Healthy</div>
    </div>
    <div class="stat-card c-critical">
      <div class="glow"></div>
      <div class="stat-icon">✗</div>
      <div class="stat-value" id="feeds-failed">—</div>
      <div class="stat-label">Failed</div>
    </div>
    <div class="stat-card c-blue">
      <div class="glow"></div>
      <div class="stat-icon">◈</div>
      <div class="stat-value" id="feeds-total">—</div>
      <div class="stat-label">Total Feeds</div>
    </div>
    <div class="stat-card c-purple">
      <div class="glow"></div>
      <div class="stat-icon">↻</div>
      <div class="stat-value" id="runs-today">—</div>
      <div class="stat-label">Runs Today</div>
    </div>
  </div>

  <div class="card mb-5">
    <div class="card-head"><div class="card-title">Feed Status</div></div>
    <div id="feed-health-list">Loading…</div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title">Recent Pipeline Runs</div></div>
    <div id="recent-runs">Loading…</div>
  </div>
</main>

<div class="toast-wrap" id="toasts"></div>
<script src="/js/common.js"></script>
<script src="/js/feeds.js"></script>
</body>
</html>
