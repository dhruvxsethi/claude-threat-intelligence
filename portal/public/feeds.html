<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Health — CTI</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <div class="logo-text">
        <div class="logo-name">CTI Platform</div>
        <div class="logo-sub">by Claude AI</div>
      </div>
      <div class="live-pill"><span class="live-dot"></span>Live</div>
    </div>
    <div class="nav">
      <div class="nav-label">Intelligence</div>
      <a class="nav-item" href="/"><span class="nav-icon">⚡</span>Dashboard</a>
      <a class="nav-item" href="/threats.html"><span class="nav-icon">🛡</span>Threat Feed</a>
      <a class="nav-item" href="/sectors.html"><span class="nav-icon">🏢</span>Sectors</a>
      <a class="nav-item" href="/iocs.html"><span class="nav-icon">🔍</span>IOC Explorer</a>
      <div class="nav-label" style="margin-top:6px">System</div>
      <a class="nav-item active" href="/feeds.html"><span class="nav-icon">📡</span>Feed Health</a>
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-sm" onclick="triggerPipeline()" style="width:100%;margin-bottom:10px;justify-content:center">↻ Sync Now</button>
      <div class="meta-row">
        <span class="text-xs text-3">Schedule</span>
        <span class="text-xs text-2">Every 3 hours</span>
      </div>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div class="page-title">Feed Health</div>
    </div>
    <div class="content">
      <div class="stats-grid mb-5">
        <div class="stat-card c-low">
          <div class="glow"></div>
          <div class="stat-icon">✓</div>
          <div class="stat-value" id="feeds-healthy">—</div>
          <div class="stat-label">Healthy</div>
        </div>
        <div class="stat-card c-critical">
          <div class="glow"></div>
          <div class="stat-icon">✗</div>
          <div class="stat-value" id="feeds-failed">—</div>
          <div class="stat-label">Failed</div>
        </div>
        <div class="stat-card c-blue">
          <div class="glow"></div>
          <div class="stat-icon">📡</div>
          <div class="stat-value" id="feeds-total">—</div>
          <div class="stat-label">Total Feeds</div>
        </div>
        <div class="stat-card c-purple">
          <div class="glow"></div>
          <div class="stat-icon">↻</div>
          <div class="stat-value" id="runs-today">—</div>
          <div class="stat-label">Runs Today</div>
        </div>
      </div>
      <div class="card mb-4">
        <div class="card-head"><div class="card-title">Feed Status</div></div>
        <div id="feed-health-list">Loading…</div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">Recent Pipeline Runs</div></div>
        <div id="recent-runs">Loading…</div>
      </div>
    </div>
  </div>
</div>
<div class="toast-wrap" id="toasts"></div>
<script src="/js/common.js"></script>
<script src="/js/feeds.js"></script>
</body>
</html>
