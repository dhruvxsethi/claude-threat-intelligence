<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sectors — CTI</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <div class="logo-name">Threat Intelligence</div>
      <div class="logo-sub">Powered by Claude AI</div>
      <div class="live-pill"><span class="live-dot"></span> Live</div>
    </div>
    <div class="nav">
      <div class="nav-label">Intelligence</div>
      <a class="nav-item" href="/"><span class="nav-icon">⚡</span>Dashboard</a>
      <a class="nav-item" href="/threats.html"><span class="nav-icon">🛡</span>Threat Feed</a>
      <a class="nav-item active" href="/sectors.html"><span class="nav-icon">🏢</span>Sectors</a>
      <a class="nav-item" href="/iocs.html"><span class="nav-icon">🔍</span>IOC Explorer</a>
      <div class="nav-label" style="margin-top:8px">System</div>
      <a class="nav-item" href="/feeds.html"><span class="nav-icon">📡</span>Feed Health</a>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div class="page-title">Sector Intelligence</div>
      <div class="clock" id="utc-clock">00:00:00 UTC</div>
    </div>
    <div class="content">
      <div class="sector-tabs mb-6">
        <button class="sector-tab banking active" onclick="switchSector('banking',this)">🏦 Banking</button>
        <button class="sector-tab government" onclick="switchSector('government',this)">🏛️ Government</button>
        <button class="sector-tab healthcare" onclick="switchSector('healthcare',this)">🏥 Healthcare</button>
      </div>
      <div id="sector-content">
        <div class="empty"><div class="empty-icon">⏳</div><div class="empty-title">Loading…</div></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-wrap" id="toasts"></div>
<script src="/js/common.js"></script>
<script src="/js/sectors.js"></script>
</body>
</html>
