# Threat Intelligence Feed Sources
# Organized by tier (1=most authoritative, 5=supplementary)
# rotation_slot: A = vulnerability APIs, B = news/blogs, BOTH = always runs
# last_updated: auto-updated by the pipeline
# Do NOT auto-overwrite this file.

feeds:

  # ─── TIER 1: OFFICIAL GOVERNMENT & CERT SOURCES ───────────────────────────

  - id: cisa_advisories
    name: "CISA Cybersecurity Advisories"
    url: "https://www.cisa.gov/cybersecurity-advisories/feed"
    type: rss
    tier: 1
    rotation_slot: A
    sectors: [government, banking, healthcare]
    enabled: false  # URL returns 404 — covered by CISA KEV JSON API below
    source_credibility: 100

  - id: cisa_kev_api
    name: "CISA Known Exploited Vulnerabilities"
    url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
    type: json_api
    tier: 1
    rotation_slot: A
    sectors: [banking, government, healthcare]
    enabled: true
    source_credibility: 100

  - id: nvd_cve_api
    name: "NIST NVD CVE Database"
    url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
    type: json_api
    tier: 1
    rotation_slot: A
    sectors: [banking, government, healthcare]
    enabled: true
    source_credibility: 100
    params:
      resultsPerPage: 20
      pubStartDate: "dynamic_last_run"

  - id: ncsc_uk
    name: "UK NCSC Alerts & Advisories"
    url: "https://www.ncsc.gov.uk/api/1/services/v1/report-rss-feed.xml"
    type: rss
    tier: 1
    rotation_slot: A
    sectors: [government, banking]
    enabled: true
    source_credibility: 98

  - id: github_security_advisories
    name: "GitHub Security Advisories"
    url: "https://api.github.com/advisories"
    type: json_api
    tier: 1
    rotation_slot: A
    sectors: [banking, government, healthcare]
    enabled: true
    source_credibility: 92
    params:
      per_page: 30
      type: reviewed

  - id: cert_eu_advisories
    name: "CERT-EU Security Advisories"
