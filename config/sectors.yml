# Severity thresholds for sector impact rating
severity_thresholds:
  critical:
    description: "Active exploitation confirmed, mass impact, life-safety risk"
    credibility_min: 60
  high:
    description: "High confidence threat, significant sector exposure"
    credibility_min: 40
  medium:
    description: "Credible threat, moderate exposure"
    credibility_min: 20
  low:
    description: "Early warning, limited confirmed impact"
    credibility_min: 0
