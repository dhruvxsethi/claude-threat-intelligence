# Sector definitions for threat classification
# Claude uses these keywords to determine sector relevance of a threat.
# Do NOT auto-overwrite this file.

sectors:

  banking:
    name: "Banking & Financial Services"
    description: "Financial institutions, payment processors, crypto exchanges, fintech, insurance"
    icon: "🏦"
    color: "#3b82f6"
    keywords:
      - bank
      - banking
      - financial
      - finance
      - fintech
      - payment
      - swift
      - wire transfer
      - credit card
      - debit card
      - atm
      - pos terminal
      - cryptocurrency
      - crypto exchange
      - bitcoin
      - ethereum
      - blockchain
      - wallet
      - trading platform
      - brokerage
      - insurance
      - mortgage
      - loan
      - federal reserve
      - treasury
      - sec
      - fincen
      - pci dss
      - sox
      - fatf
      - money laundering
      - fraud
      - skimming
      - carding
      - account takeover
      - ach
      - nacha
      - mastercard
      - visa
      - paypal
      - stripe
      - square
    threat_types_of_concern:
